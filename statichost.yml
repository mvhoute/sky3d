# FILENAME: statichost.yml
# Docker image to use for building (Node.js for React/Vite)
# Updated to Node 20 LTS to support Vite 7.3 and React Router 7.x
image: node:20-alpine
# Build command (install dependencies and build React app)
command: cd frontend && npm ci && npm run build
# Public directory (Vite outputs to dist by default)
public: frontend/dist
# SPA fallback: serve index.html for all routes (required for React Router)
spa: true
